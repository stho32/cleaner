name: Build, Test & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION_DIR: "Source/cleaner"

jobs:
  prepare:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate next version
        id: bump
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
          echo "Bump type: $BUMP_TYPE"

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.RUNTIMEID }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            RUNTIMEID: linux-x64
            ARTIFACT: cleaner-linux-x64
          - os: windows-latest
            RUNTIMEID: win-x64
            ARTIFACT: cleaner-win-x64
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore
        working-directory: ${{ env.SOLUTION_DIR }}

      - name: Build
        run: dotnet build --configuration Release --no-restore
        working-directory: ${{ env.SOLUTION_DIR }}

      - name: Test with Coverage
        run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage"
        working-directory: ${{ env.SOLUTION_DIR }}

      - name: Publish
        run: >
          dotnet publish cleaner/cleaner.csproj
          -c Release
          -r ${{ matrix.RUNTIMEID }}
          -o ${{ matrix.ARTIFACT }}
          -p:PublishReadyToRun=true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:UseAppHost=true
          -p:Version=${{ needs.prepare.outputs.version }}
          --self-contained true
        working-directory: ${{ env.SOLUTION_DIR }}

      - name: Zip Artifact
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.ARTIFACT }}" -DestinationPath "${{ matrix.ARTIFACT }}.zip"
        working-directory: ${{ env.SOLUTION_DIR }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.ARTIFACT }}
          path: ${{ env.SOLUTION_DIR }}/${{ matrix.ARTIFACT }}.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create tag
        run: |
          git tag ${{ needs.prepare.outputs.tag }}
          git push origin ${{ needs.prepare.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: ./artifacts/*.zip
